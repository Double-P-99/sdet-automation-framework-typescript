version: "3.9"

# Ephemeral test environment — databases are reset between runs

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: sdet_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./db/init/01_init.sh:/docker-entrypoint-initdb.d/01_init.sh
    tmpfs:
      - /var/lib/postgresql/data  # In-memory for fast test resets
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 15

  auth-service-test:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: sdet_auth_service_test
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/authdb
      SECRET_KEY: test-secret-key-stable-for-integration-tests-32ch
      ENVIRONMENT: test
      LOG_LEVEL: DEBUG
    ports:
      - "8001:8001"
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  orders-service-test:
    build:
      context: ./orders_service
      dockerfile: Dockerfile
    container_name: sdet_orders_service_test
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/ordersdb
      SECRET_KEY: test-secret-key-stable-for-integration-tests-32ch
      ENVIRONMENT: test
      LOG_LEVEL: DEBUG
    ports:
      - "8002:8002"
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
