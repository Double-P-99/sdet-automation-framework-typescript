name: CI — Smoke + API + Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Start backend services
  # ────────────────────────────────────────────────────────────────
  backend-services:
    name: Start Backend Services
    runs-on: ubuntu-latest
    outputs:
      services-healthy: ${{ steps.health.outputs.healthy }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and start test containers
        working-directory: backend
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for services to be healthy
        id: health
        run: |
          echo "Waiting for auth-service..."
          timeout 60 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'
          echo "Waiting for orders-service..."
          timeout 60 bash -c 'until curl -sf http://localhost:8002/health; do sleep 2; done'
          echo "healthy=true" >> $GITHUB_OUTPUT

      - name: Seed test data
        run: |
          # Re-run seed SQL against the test database on port 5433
          docker exec sdet_postgres_test psql -U postgres -d authdb -f /dev/stdin < backend/db/init/03_seed.sql

  # ────────────────────────────────────────────────────────────────
  # 2. TypeScript type-check
  # ────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run type-check

  # ────────────────────────────────────────────────────────────────
  # 3. Smoke tests
  # ────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-services, type-check]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        env:
          AUTH_API_URL: http://localhost:8001
          ORDERS_API_URL: http://localhost:8002
          CUSTOMER_EMAIL: customer@test.com
          CUSTOMER_PASSWORD: Test@12345
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: Test@12345
        run: npx playwright test --project=smoke --reporter=github

  # ────────────────────────────────────────────────────────────────
  # 4. API tests
  # ────────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [smoke]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run API tests
        env:
          AUTH_API_URL: http://localhost:8001
          ORDERS_API_URL: http://localhost:8002
          CUSTOMER_EMAIL: customer@test.com
          CUSTOMER_PASSWORD: Test@12345
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: Test@12345
        run: npx playwright test --project=api --reporter=github

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # 5. Integration tests (API + DB validation)
  # ────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (API + DB)
    runs-on: ubuntu-latest
    needs: [smoke]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run integration tests
        env:
          AUTH_API_URL: http://localhost:8001
          ORDERS_API_URL: http://localhost:8002
          ORDERS_DB_URL: postgresql://postgres:postgres@localhost:5433/ordersdb
          AUTH_DB_URL: postgresql://postgres:postgres@localhost:5433/authdb
          CUSTOMER_EMAIL: customer@test.com
          CUSTOMER_PASSWORD: Test@12345
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: Test@12345
        run: npx playwright test --project=integration --reporter=github

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # 6. Cleanup
  # ────────────────────────────────────────────────────────────────
  cleanup:
    name: Stop Test Containers
    runs-on: ubuntu-latest
    needs: [api-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Stop containers
        working-directory: backend
        run: docker compose -f docker-compose.test.yml down -v
